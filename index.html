<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Clone UI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🎧 Spotify</h2>
    <p>Home</p>
    <p>Search</p>
    <p>Your Library</p>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <header>
      <h1>Good Evening</h1>
    </header>

    <div class="grid">

      <div class="card">
        <img src="assets/trending.jpg">
        <p>Trending Hits</p>
      </div>

      <div class="card">
        <img src="assets/love.jpg">
        <p>Love Songs</p>
      </div>

      <div class="card">
        <img src="assets/chill.jpg">
        <p>Chill Vibes</p>
      </div>

      <div class="card">
        <img src="assets/workout.jpg">
        <p>Workout Mix</p>
      </div>

    </div>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
